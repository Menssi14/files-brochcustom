<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Sharing — BrochCustom</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --green: #1e5c2a;
      --green-light: #2d7a3a;
      --green-dim: rgba(30,92,42,0.15);
      --mono: 'DM Mono', monospace;
      --serif: 'Cormorant Garamond', serif;
    }
    body { background: var(--black); color: var(--white); font-family: var(--mono); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; max-width: 900px; padding: 2.5rem 2rem 1.5rem; display: flex; align-items: center; gap: 1rem; animation: fadeDown 0.8s ease both; }
    header img { width: 48px; height: 48px; object-fit: contain; }
    header h1 { font-family: 'Teko', sans-serif; font-weight: 400; font-size: 2.2rem; letter-spacing: 0.1em; color: var(--white); line-height: 1; }
    header span { font-family: var(--mono); font-size: 0.65rem; color: var(--green-light); letter-spacing: 0.2em; text-transform: uppercase; display: block; margin-top: 2px; }
    .divider { width: 100%; max-width: 900px; height: 1px; background: linear-gradient(90deg, transparent, var(--green), transparent); margin-bottom: 2.5rem; animation: fadeIn 1s ease 0.3s both; }
    main { width: 100%; max-width: 900px; padding: 0 2rem 4rem; display: flex; flex-direction: column; gap: 2.5rem; animation: fadeUp 0.8s ease 0.2s both; }
    .upload-zone { border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; background: rgba(255,255,255,0.02); }
    .upload-zone::before { content: ''; position: absolute; inset: 0; background: var(--green-dim); opacity: 0; transition: opacity 0.3s; }
    .upload-zone:hover::before, .upload-zone.dragging::before { opacity: 1; }
    .upload-zone:hover, .upload-zone.dragging { border-color: var(--green-light); }
    .upload-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; opacity: 0.6; }
    .upload-zone h2 { font-family: var(--serif); font-weight: 300; font-size: 1.4rem; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .upload-zone p { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-transform: uppercase; }
    #fileInput { display: none; }
    .btn-upload { margin-top: 1.5rem; display: inline-block; padding: 0.6rem 2rem; border: 1px solid var(--green); color: var(--green-light); font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; background: transparent; transition: all 0.25s ease; border-radius: 2px; }
    .btn-upload:hover { background: var(--green); color: var(--white); }
    .progress-wrap { display: none; margin-top: 1.2rem; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--green-light); width: 0%; transition: width 0.3s ease; }
    #status { font-size: 0.68rem; color: var(--green-light); letter-spacing: 0.15em; text-align: center; min-height: 1.2em; margin-top: 0.5rem; }
    .files-header { display: flex; align-items: center; justify-content: space-between; }
    .files-header h3 { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .files-header span { font-size: 0.65rem; color: var(--green-light); letter-spacing: 0.1em; }
    .file-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .file-item { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; border: 1px solid rgba(255,255,255,0.07); border-radius: 3px; background: rgba(255,255,255,0.02); transition: all 0.2s ease; animation: slideIn 0.4s ease both; }
    .file-item:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
    .file-icon { font-size: 1.2rem; opacity: 0.7; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.02em; }
    .file-meta { font-size: 0.62rem; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; margin-top: 2px; }
    .file-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn-action { padding: 0.3rem 0.8rem; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; border-radius: 2px; cursor: pointer; transition: all 0.2s ease; border: 1px solid; }
    .btn-dl { border-color: var(--green); color: var(--green-light); background: transparent; }
    .btn-dl:hover { background: var(--green); color: var(--white); }
    .btn-del { border-color: rgba(255,80,80,0.3); color: rgba(255,100,100,0.6); background: transparent; }
    .btn-del:hover { background: rgba(255,50,50,0.15); border-color: rgba(255,80,80,0.6); color: rgba(255,120,120,1); }
    .empty { text-align: center; padding: 3rem; color: rgba(255,255,255,0.2); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border: 1px dashed rgba(255,255,255,0.06); border-radius: 3px; }
    footer { margin-top: auto; padding: 1.5rem; font-size: 0.6rem; color: rgba(255,255,255,0.15); letter-spacing: 0.2em; text-transform: uppercase; text-align: center; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    @media (max-width: 600px) { .file-actions { flex-direction: column; } .btn-action { text-align: center; } }
  </style>
</head>
<body>
  <header>
    <img src="Website.png" alt="BrochCustom Logo" />
    <div>
      <h1>File Sharing</h1>
      <span>by BrochCustom</span>
    </div>
  </header>
  <div class="divider"></div>
  <main>
    <div class="upload-zone" id="dropZone">
      <span class="upload-icon">⬆</span>
      <h2>Drop files here</h2>
      <p>or browse your device</p>
      <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Select Files</button>
      <input type="file" id="fileInput" multiple />
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div id="status"></div>
    </div>
    <div>
      <div class="files-header">
        <h3>Stored Files</h3>
        <span id="fileCount">0 files</span>
      </div>
      <br/>
      <div class="file-list" id="fileList">
        <div class="empty">No files uploaded yet</div>
      </div>
    </div>
  </main>
  <footer><a href="https://brochcustom.com/" target="_blank" style="color: var(--green-light); text-decoration: none; letter-spacing: 0.2em;">← Main Page</a></footer>

  <script>
    const SUPABASE_URL = 'https://ixuxzdaevbytnznxmtal.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4dXh6ZGFldmJ5dG56bnhtdGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzIyNjMsImV4cCI6MjA5MjA0ODI2M30.9FxQ47kbShuIehy2aqRkG11fewLjHxX1RvoPtCYPTIE';
    const BUCKET = 'files';
    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const fileCount = document.getElementById('fileCount');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const status = document.getElementById('status');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragging'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    async function handleFiles(fileObjs) {
      for (const file of [...fileObjs]) await uploadFile(file);
    }

    async function uploadFile(file) {
      progressWrap.style.display = 'block';
      progressBar.style.width = '40%';
      status.textContent = 'Uploading ' + file.name + '...';
      const fileName = Date.now() + '_' + file.name;
      const { error } = await client.storage.from(BUCKET).upload(fileName, file);
      if (error) {
        status.textContent = '✗ Failed: ' + error.message;
        progressWrap.style.display = 'none';
        return;
      }
      progressBar.style.width = '100%';
      setTimeout(() => {
        progressWrap.style.display = 'none';
        progressBar.style.width = '0%';
        status.textContent = '✓ Upload complete';
        setTimeout(() => status.textContent = '', 2000);
        loadFiles();
      }, 400);
    }

    function getFileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼';
      if (['pdf'].includes(ext)) return '📄';
      if (['zip','rar','7z','tar','gz'].includes(ext)) return '📦';
      if (['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
      if (['mp3','wav','flac','aac'].includes(ext)) return '🎵';
      if (['doc','docx'].includes(ext)) return '📝';
      if (['xls','xlsx','csv'].includes(ext)) return '📊';
      return '📁';
    }

    function formatSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function loadFiles() {
      const { data, error } = await client.storage.from(BUCKET).list('', { sortBy: { column: 'created_at', order: 'desc' } });
      fileList.innerHTML = '';
      if (error || !data || data.length === 0) {
        fileList.innerHTML = '<div class="empty">No files uploaded yet</div>';
        fileCount.textContent = '0 files';
        return;
      }
      fileCount.textContent = data.length + (data.length === 1 ? ' file' : ' files');
      data.forEach(file => {
        const displayName = file.name.replace(/^\d+_/, '');
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="file-icon">${getFileIcon(file.name)}</span>
          <div class="file-info">
            <div class="file-name">${displayName}</div>
            <div class="file-meta">${formatSize(file.metadata?.size)}</div>
          </div>
          <div class="file-actions">
            <button class="btn-action btn-dl" onclick="downloadFile('${file.name}', '${displayName}')">Download</button>
            <button class="btn-action btn-del" onclick="deleteFile('${file.name}', this)">Delete</button>
          </div>`;
        fileList.appendChild(item);
      });
    }

    async function downloadFile(fileName, displayName) {
      const { data, error } = await client.storage.from(BUCKET).download(fileName);
      if (error) { alert('Download failed'); return; }
      const url = URL.createObjectURL(data);
      const a = document.createElement('a');
      a.href = url; a.download = displayName; a.click();
      URL.revokeObjectURL(url);
    }

    async function deleteFile(fileName, btn) {
      const item = btn.closest('.file-item');
      item.style.opacity = '0'; item.style.transition = 'opacity 0.3s';
      const { error } = await client.storage.from(BUCKET).remove([fileName]);
      if (error) { item.style.opacity = '1'; alert('Delete failed'); return; }
      setTimeout(() => { item.remove(); loadFiles(); }, 300);
    }

    loadFiles();
  </script>
</body>
</html>
